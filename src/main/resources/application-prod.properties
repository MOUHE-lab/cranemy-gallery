server.port=${PORT:8080}
portfolio.storage=mysql
portfolio.upload-dir=${UPLOAD_DIR:uploads}
portfolio.upload.max-bytes=${UPLOAD_MAX_BYTES:8388608}
portfolio.upload.max-image-bytes=${UPLOAD_MAX_IMAGE_BYTES:8388608}
portfolio.upload.max-video-bytes=${UPLOAD_MAX_VIDEO_BYTES:209715200}

spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

server.forward-headers-strategy=framework
server.servlet.session.timeout=${SESSION_TIMEOUT:30m}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

spring.servlet.multipart.max-file-size=${UPLOAD_MAX_FILE_SIZE:200MB}
spring.servlet.multipart.max-request-size=${UPLOAD_MAX_REQUEST_SIZE:210MB}

logging.level.root=INFO
logging.level.com.example.portfolio=INFO
